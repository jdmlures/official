<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDMLures Detail</title>

<link rel="stylesheet" href="detail.css">

<link rel="apple-touch-icon" sizes="180x180" href="../img/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="..img/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">


</head>
<body>

<!-- 基本情報：価格横にBUYボタン -->
<section class="section">
  <div class="container">
    <h2 id="detail-title"></h2>

    <div class="price-buy-wrapper">
      <p id="detail-price">$ 160</p>
      <a href="https://www.paypal.com/uk/digital-wallet/ways-to-pay/credit-services" class="paypal-btn" target="_blank">BUY</a>
    </div>

    <p id="detail-desc"></p>
  </div>
</section>

<!-- HERO / 商品画像 -->
<section class="section hero">
  <div class="container">
    <img id="detail-hero-img" src="" alt="Product Hero">
  </div>
</section>

<!-- 追加画像 -->
<section class="section">
  <div class="container"><img src="../img/img1.jpg" alt=""></div>
</section>
<section class="section">
  <div class="container"><img src="../img/img2.jpg" alt=""></div>
</section>
<section class="section">
  <div class="container"><img src="../img/img4.jpg" alt=""></div>
</section>
<section class="section">
  <div class="container"><img src="../img/img5.jpg" alt=""></div>
</section>


<!-- 戻る + BUYボタン（横並び統一） -->
<section class="section back-section">

  <div class="payment-icons">

    <!-- PayPal -->
  <svg viewBox="0 0 170 40" aria-label="PayPal">
    <g transform="translate(0,4)">
      <path fill="#003087"
        d="M18 4c6 0 10 4 9 9s-5 9-11 9h-4l-2 12H4l5-30h9z"/>
      <path fill="#009CDE"
        d="M22 4c5 0 8 3 7 7s-4 7-9 7h-5l-2 12H6l4-26h12z"/>
    </g>
    <text x="50" y="26"
          font-family="Helvetica, Arial, sans-serif"
          font-size="22"
          font-weight="700">
      <tspan fill="#003087">Pay</tspan><tspan fill="#009CDE">Pal</tspan>
    </text>
  </svg>

  <!-- VISA -->
<img src="../custom/c_img/visa.png" alt="">

  <!-- Mastercard -->
  <svg viewBox="0 0 48 32" aria-label="Mastercard">
    <circle cx="18" cy="16" r="10" fill="#EB001B"/>
    <circle cx="30" cy="16" r="10" fill="#F79E1B"/>
    <path fill="#FF5F00" d="M24 6a10 10 0 000 20 10 10 0 000-20z"/>
  </svg>

  <!-- American Express -->
  <svg viewBox="0 0 60 38" aria-label="American Express">
    <rect width="60" height="38" fill="#2E77BB"/>
    <text x="30" y="16" font-size="9" fill="#ffffff"
          font-family="Arial" font-weight="bold"
          text-anchor="middle">AMERICAN</text>
    <text x="30" y="28" font-size="9" fill="#ffffff"
          font-family="Arial" font-weight="bold"
          text-anchor="middle">EXPRESS</text>
  </svg>

</div>
  <div class="container">
    <div class="price-buy-wrapper">
      <a href="../index.html" class="back-button">BACK</a>
      <a href="https://www.paypal.com/uk/digital-wallet/ways-to-pay/credit-services" class="paypal-btn" target="_blank">BUY</a>
    </div>
  </div>
</section>



<script src="detail.js"></script>
</body>
</html>
