<body>

<!-- 商品情報 -->
<section class="section">

</section>

<!-- 他画像セクション -->
<section class="section">
  <div class="container">
    <img id="detail-img-1" src="../img/img2.jpg" alt="">

<!-- 支払いロゴ -->

  <div class="payment-icons">
    <!-- PayPal -->
    <svg viewBox="0 0 140 40" aria-label="PayPal" role="img">
      <g transform="translate(0,4)">
        <path fill="#003087" d="M18 4c6 0 10 4 9 9s-5 9-11 9h-4l-2 12H4l5-30h9z"/>

        <tspan fill="#003087">Pay</tspan>
        <tspan fill="#009CDE">Pal</tspan>
      </text>
    </svg>

    <!-- VISA -->
    <img src="../custom/c_img/visa.png" alt="Visa">

    <!-- Mastercard -->
    <svg viewBox="0 0 48 32" aria-label="Mastercard">
      <circle cx="18" cy="16" r="10" fill="#EB001B"/>
      <circle cx="30" cy="16" r="10" fill="#F79E1B"/>
      <path fill="#FF5F00" d="M24 6a10 10 0 000 20 10 10 0 000-20z"/>
    </svg>

    <!-- American Express -->
    <svg viewBox="0 0 60 38" aria-label="American Express">
      <rect width="60" height="38" fill="#2E77BB"/>
      <text x="30" y="16" font-size="9" fill="#ffffff" font-family="Arial" font-weight="bold" text-anchor="middle">
        AMERICAN
      </text>
      <text x="30" y="28" font-size="9" fill="#ffffff" font-family="Arial" font-weight="bold" text-anchor="middle">

      <a href="#" class="paypal-btn" id="detail-buy-btn-bottom" target="_blank">BUY</a>

    <p>© 2026 JDM Lures  All Rights Reserved.</p>
  </div>
